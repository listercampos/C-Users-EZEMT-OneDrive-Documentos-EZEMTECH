<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b63ce" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https:; img-src 'self' data:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>EZEMTECH Virtual Tech</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">EZEMTECH</p>
          <h1>Tecnico Virtual</h1>
          <p class="hero-copy">
            Diagnostico rapido para computadoras, drones, telefonos e IA. Disponible en
            espanol e ingles, conectado a EZEMTECH.com para reservas y soporte.
          </p>
        </div>
        <div class="status-card">
          <span class="status-dot"></span>
          <strong>Online</strong>
          <small>Soporte remoto y presencial</small>
        </div>
      </section>

      <section class="toolbar" aria-label="Controles">
        <div class="segmented" role="group" aria-label="Idioma">
          <button class="segment active" type="button" data-language="es">ES</button>
          <button class="segment" type="button" data-language="en">EN</button>
        </div>
        <div class="voice-tools" role="group" aria-label="Voz">
          <button class="icon-button" id="toggleVoice" type="button" aria-label="Activar voz" title="Activar voz" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
            </svg>
          </button>
          <button class="icon-button" id="dictateIssue" type="button" aria-label="Dictar problema" title="Dictar problema" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <path d="M12 19v3"></path>
            </svg>
          </button>
        </div>
        <button class="install-button" type="button" hidden>Instalar app</button>
      </section>

      <section class="service-grid" aria-label="Categorias de soporte">
        <button class="service-card active" type="button" data-device="computers">
          <span>PC</span>
          <strong>Computadoras</strong>
          <small>Windows, Mac, internet, virus</small>
        </button>
        <button class="service-card" type="button" data-device="phones">
          <span>PH</span>
          <strong>Telefonos</strong>
          <small>iPhone, Android, apps, datos</small>
        </button>
        <button class="service-card" type="button" data-device="drones">
          <span>DR</span>
          <strong>Drones</strong>
          <small>Conexion, camara, calibracion</small>
        </button>
        <button class="service-card" type="button" data-device="ai">
          <span>AI</span>
          <strong>IA</strong>
          <small>Chatbots, automatizacion, prompts</small>
        </button>
      </section>

      <section class="diagnostic-panel">
        <div class="chat-column">
          <div class="conversation" id="conversation" aria-live="polite"></div>
          <form class="chat-composer" id="chatForm">
            <input id="chatInput" name="message" autocomplete="off" placeholder="Escribe o usa el microfono..." />
            <button class="composer-button" type="submit">Enviar</button>
          </form>
          <label class="learning-consent">
            <input id="learningConsent" type="checkbox" />
            <span id="learningConsentText">Permitir guardar esta conversacion para mejorar el servicio.</span>
          </label>
        </div>

        <form class="diagnostic-form" id="diagnosticForm">
          <label>
            <span id="issueLabel">Describe el problema</span>
            <textarea name="issue" rows="4" required placeholder="Ejemplo: Mi laptop esta lenta y se apaga sola."></textarea>
          </label>
          <div class="form-row">
            <label>
              <span id="urgencyLabel">Urgencia</span>
              <select name="urgency">
                <option value="today">Hoy</option>
                <option value="week">Esta semana</option>
                <option value="general">Consulta general</option>
              </select>
            </label>
            <label>
              <span id="serviceLabel">Servicio</span>
              <select name="service">
                <option value="remote">Remoto</option>
                <option value="onsite">Presencial</option>
                <option value="not-sure">No estoy seguro</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label>
              <span>Nombre</span>
              <input name="name" autocomplete="name" />
            </label>
            <label>
              <span>Telefono / Email</span>
              <input name="contact" autocomplete="email" />
            </label>
          </div>
          <button class="primary-button" type="submit">Diagnosticar</button>
        </form>
      </section>

      <section class="actions">
        <a class="action-button" href="https://www.ezemtech.com/book-online" target="_blank" rel="noopener">Reservar cita</a>
        <a class="action-button" href="https://www.ezemtech.com/" target="_blank" rel="noopener">EZEMTECH.com</a>
        <button class="action-button" type="button" id="copyTicket">Copiar ticket</button>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
